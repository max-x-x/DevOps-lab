name: Bad CI/CD

on:
  push:
  workflow_dispatch:

permissions: write-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.x"

      - name: Prepare demo project
        run: |
          mkdir -p src tests
          touch src/__init__.py
          cat > src/calc.py <<'PY'
          def add(a, b):
              return a + b
          PY
          cat > tests/test_calc.py <<'PY'
          from src.calc import add

          def test_add():
              assert add(2, 2) == 4
          PY
          cat > requirements.txt <<'TXT'
          pytest
          ruff
          TXT
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload workspace artifact
        uses: actions/upload-artifact@main
        with:
          name: workspace-bad
          path: |
            src
            tests
            requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Download workspace artifact
        uses: actions/download-artifact@main
        with:
          name: workspace-bad

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.x"

      - name: Install and lint (monolithic)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ruff check src tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Download workspace artifact
        uses: actions/download-artifact@main
        with:
          name: workspace-bad

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.x"

      - name: Install and run tests
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -q tests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Download workspace artifact
        uses: actions/download-artifact@main
        with:
          name: workspace-bad

      - name: Build archive
        run: |
          mkdir -p dist
          zip -r dist/app-bad.zip src tests requirements.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@main
        with:
          name: build-bad
          path: dist/app-bad.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@main
        with:
          name: build-bad
          path: dist

      - name: Deploy
        run: |
          echo "Deploying build"
          ls -la dist
