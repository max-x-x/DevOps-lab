services:
  vault:
    image: hashicorp/vault:1.19
    container_name: vault-local
    command: server -dev

    ports:
      - "${VAULT_PORT:-8200}:8200"

    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-change-me}
      VAULT_UI: "true"

    cap_add:
      - IPC_LOCK

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        [
          "CMD",
          "vault",
          "status",
          "-address=http://127.0.0.1:8200",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: vault-local
