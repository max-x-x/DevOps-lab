apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hello-service.fullname" . }}-site
  labels:
    {{- include "hello-service.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="ru">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>{{ .Values.site.title }}</title>
      <style>
        :root {
          --bg: #f7fafc;
          --fg: #0f172a;
          --muted: #475569;
          --accent: {{ .Values.site.accentColor }};
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: Inter, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
          color: var(--fg);
          background: linear-gradient(165deg, #ffffff, #eef2ff 45%, #f8fafc);
        }
        .card {
          width: min(90vw, 680px);
          background: #ffffff;
          border: 1px solid #e2e8f0;
          border-radius: 16px;
          padding: 2rem;
          box-shadow: 0 14px 36px rgba(2, 6, 23, 0.08);
        }
        h1 {
          margin: 0 0 0.6rem;
          font-size: clamp(1.6rem, 3.5vw, 2rem);
          line-height: 1.2;
          color: var(--accent);
        }
        p {
          margin: 0;
          font-size: 1.05rem;
          color: var(--muted);
        }
      </style>
    </head>
    <body>
      <main class="card">
        <h1>{{ .Values.site.heading }}</h1>
        <p>{{ .Values.site.subtitle }}</p>
      </main>
    </body>
    </html>
