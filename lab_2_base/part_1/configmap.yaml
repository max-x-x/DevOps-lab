apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-site
  namespace: lab2
  labels:
    app: hello-app
    app.kubernetes.io/part-of: lab-2-base
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ru">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>lab2 — hello</title>
      <style>
        :root {
          color-scheme: light dark;
          --bg: #0f1419;
          --fg: #e7eef7;
          --muted: #8b9bb0;
          --accent: #5eead4;
        }
        @media (prefers-color-scheme: light) {
          :root {
            --bg: #f6f8fb;
            --fg: #0f172a;
            --muted: #64748b;
            --accent: #0d9488;
          }
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
          background: radial-gradient(1200px 800px at 20% 0%, color-mix(in oklab, var(--accent) 22%, var(--bg)), var(--bg));
          color: var(--fg);
        }
        main {
          width: min(92vw, 640px);
          padding: 2.25rem 2rem;
          border-radius: 16px;
          border: 1px solid color-mix(in oklab, var(--fg) 14%, transparent);
          background: color-mix(in oklab, var(--bg) 86%, transparent);
          backdrop-filter: blur(10px);
          box-shadow: 0 24px 80px color-mix(in oklab, var(--fg) 12%, transparent);
        }
        h1 {
          margin: 0 0 0.75rem;
          font-size: clamp(1.6rem, 3.6vw, 2.1rem);
          letter-spacing: -0.02em;
          line-height: 1.15;
        }
        p {
          margin: 0;
          color: var(--muted);
          line-height: 1.6;
          font-size: 1.05rem;
        }
        code {
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
          font-size: 0.95em;
          padding: 0.12em 0.35em;
          border-radius: 8px;
          border: 1px solid color-mix(in oklab, var(--fg) 14%, transparent);
          background: color-mix(in oklab, var(--fg) 6%, transparent);
        }
      </style>
    </head>
    <body>
      <main>
        <h1>hello world from kubernetes</h1>
        <p>Статика отдаётся через <code>nginx</code>, конфиг и страница лежат в <code>ConfigMap</code>.</p>
      </main>
    </body>
    </html>
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      gzip on;
      gzip_types text/plain text/css application/javascript application/json text/html application/xml image/svg+xml;
      gzip_min_length 256;

      add_header X-Content-Type-Options nosniff always;

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
